        background: #fff;
      }

      .container {

      }

      }

      a:hover {
        opacity: 0.7;
      }

      h1 {
        margin-bottom: 30px;

      }

      h2 {
        color: #555;
        font-size: 20px;
        margin-bottom: 15px;
      }

      <p><a href="https://github.com/k2qwcxz/goit-py_web-hw-12" target="_blank">https://github.com/k2qwcxz/goit-py_web-hw-12</a></p>
